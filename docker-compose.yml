version: '3.8'

services:
  app:
    build: .
    ports:
      - "3001:3001"
      - "5173:5173"
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm run server & npm run dev -- --host"
